<svg width="100%" viewBox="0 0 680 330" role="img" xmlns="http://www.w3.org/2000/svg"><title>Without loop engineering: recursive human prompting</title><desc>The human prompts the agent, reviews its output, and re-prompts every turn, so each iteration passes through the human. Benefits include full control and near-zero setup; problems include the human being the bottleneck and no progress while away.</desc>
<defs>
<style>
.t{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;fill:#1a1a1a}
.ts{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:12px;fill:#6b6b6b}
.th{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:500;fill:#1a1a1a}
.box{fill:#f5f5f3;stroke:#d8d8d2;stroke-width:1}
.arr{stroke:#6b6b6b;stroke-width:1.5;fill:none}
.c-green{fill:#3a9d6e;stroke:#3a9d6e}
.c-red{fill:#cf5a4e;stroke:#cf5a4e}
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="th" x="40" y="30">Without loop engineering: recursive human prompting</text>
<rect class="box" x="110" y="56" width="160" height="58" rx="4"/>
<text class="th" x="190" y="82" text-anchor="middle">you (the human)</text>
<text class="ts" x="190" y="100" text-anchor="middle">prompt + review each turn</text>
<rect class="box" x="410" y="56" width="160" height="58" rx="4"/>
<text class="th" x="490" y="82" text-anchor="middle">coding agent</text>
<text class="ts" x="490" y="100" text-anchor="middle">executes one turn</text>
<line class="arr" x1="270" y1="76" x2="408" y2="76" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="70" text-anchor="middle">prompt + context</text>
<line class="arr" x1="410" y1="96" x2="272" y2="96" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="112" text-anchor="middle">output to review</text>
<text class="ts" x="340" y="142" text-anchor="middle">every iteration passes through you</text>
<rect class="box" x="40" y="162" width="290" height="150" rx="4"/>
<rect class="c-green" x="58" y="178" width="12" height="12" rx="2"/>
<text class="th" x="80" y="188">benefits</text>
<text class="ts" x="58" y="216">· full control at every step</text>
<text class="ts" x="58" y="240">· easy to redirect mid-task</text>
<text class="ts" x="58" y="264">· almost no setup or infra</text>
<text class="ts" x="58" y="288">· cheap for genuine one-offs</text>
<rect class="box" x="360" y="162" width="290" height="150" rx="4"/>
<rect class="c-red" x="378" y="178" width="12" height="12" rx="2"/>
<text class="th" x="400" y="188">problems</text>
<text class="ts" x="378" y="216">· you are the bottleneck</text>
<text class="ts" x="378" y="240">· nothing happens while away</text>
<text class="ts" x="378" y="264">· memory lost between sessions</text>
<text class="ts" x="378" y="288">· doesn't scale with volume</text>
</svg>
